name: CI de Testes de API

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  execucao-testes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Subir API e Rodar Testes
        run: |
          npx serverest@latest --port 3000 &
          echo "Aguardando API..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000); do
            printf '.'
            sleep 5
          done
          echo "API Online!"
          npx cypress run --config baseUrl=http://localhost:3000 --spec "cypress/integration/*.spec.js"

      - name: Upload do Relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-final
          path: cypress/reports
